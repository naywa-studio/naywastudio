services:
  agent-leo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nawa-agent-leo
    ports:
      - "8000:8000"
    env_file:
      - ../.env.local
    environment:
      - AGENT_LEVEL=leo
    profiles:
      - leo

  agent-nora:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: nawa-agent-nora
    ports:
      - "8001:8000"
    env_file:
      - ../.env.local
    environment:
      - AGENT_LEVEL=nora
    profiles:
      - nora
