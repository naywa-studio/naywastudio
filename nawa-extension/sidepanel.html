<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nawa Studio</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
              stroke="#7C63C8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand">Nawa Studio</span>
    </div>
    <div id="header-status" class="status-pill status-pill--loading">…</div>
  </header>

  <!-- ── Messages (chat) ─────────────────────────────────────────────────── -->
  <main class="messages" id="messages" role="log" aria-live="polite"></main>

  <!-- ── Barre de collecte (visible uniquement en mode "collecting") ──────── -->
  <div class="collect-bar hidden" id="collect-bar">
    <div class="collect-bar__inner">
      <span class="collect-dot"></span>
      <span id="collect-count">0 profil(s) capturé(s)</span>
      <button class="btn btn--primary btn--sm" id="btn-analyze" disabled>
        Analyser →
      </button>
    </div>
    <p class="collect-hint">Faites défiler LinkedIn pour en charger plus</p>
  </div>

  <!-- ── Zone de saisie ──────────────────────────────────────────────────── -->
  <footer class="input-area" id="input-area">
    <textarea
      id="user-input"
      class="input-textarea"
      placeholder="Quel profil cherchez-vous ? (ex: Développeur React senior Paris)"
      rows="2"
    ></textarea>
    <button class="btn btn--icon" id="send-btn" aria-label="Envoyer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
