<!doctype html><html><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*{box-sizing:border-box}html,body{margin:0}
body{background:#FDFCF9;font-family:Inter,sans-serif;color:#1A1B2E;padding:24px 12px}
.wrap{display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.vp{background:#FDFCF9;border:1px dashed #C9C2AE;padding:8px}
.vp.desk{width:1180px;max-width:100%}
.vp.mob{width:375px}
.vplabel{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#6B6C7F;margin-bottom:6px}
.meta{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6B6C7F}
.frame{background:#FAF7F0;border:1px solid #E9E1CB;border-radius:20px;box-shadow:0 12px 34px rgba(26,27,46,.10);overflow:hidden}
.bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #E9E1CB}
.dot{width:9px;height:9px;border-radius:9px;opacity:.55}
.url{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#6B6C7F;background:#FDFCF9;border:1px solid #E9E1CB;border-radius:999px;padding:3px 12px;margin:0 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.demo-grid{display:grid;grid-template-columns:minmax(200px,24%) minmax(0,1fr)}
.demo-steps{list-style:none;margin:0;padding:14px;border-right:1px solid #E9E1CB;display:flex;flex-direction:column;gap:4px;min-width:0}
.step{width:100%;text-align:left;display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:8px;border:none;background:transparent;cursor:pointer}
.step.on{background:#EEE9FB}
.step .n{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#E9E1CB;margin-top:2px}
.step.on .n{color:#7B63C8}
.step .l{display:block;font-size:13px;font-weight:500;color:#4B4C5E}
.step.on .l{font-weight:700;color:#1A1B2E}
.step .h{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;color:#6B6C7F}
.stage{padding:clamp(12px,2vw,18px);min-width:0;display:flex;flex-direction:column;gap:12px}
.panel{background:#FDFCF9;border:1px solid #E9E1CB;border-radius:16px;padding:clamp(14px,2.2vw,20px);display:flex;flex-direction:column;gap:12px;min-width:0;min-height:300px}
.lab{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#7B63C8}
.drop{border:1.5px dashed #B8AEDE;border-radius:12px;background:#EEE9FB;padding:10px 12px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.file{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#4B3A8F;background:#fff;border:1px solid #B8AEDE;border-radius:999px;padding:3px 9px}
.btn{font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:8px;background:#fff;color:#1A1B2E;border:1px solid #E9E1CB;white-space:nowrap;display:inline-block}
.row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;background:#fff;border:1px solid #E9E1CB;min-width:0}
.rt{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rs{font-size:11px;color:#6B6C7F;display:flex;align-items:center;gap:6px;min-width:0}
.rs span.f{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.bdg{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;border-radius:999px;padding:2px 8px;white-space:nowrap}
.bdg.i{color:#4B3A8F;background:#EEE9FB;border:1px solid #B8AEDE}
.bdg.v{color:#6B6C7F;background:#FAF7F0;border:1px solid #E9E1CB}
.score{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;border-radius:999px;padding:2px 9px}
.g{color:#2F6B33;background:#E4EFE1;border:1px solid #2F6B3333}
.v{color:#7B63C8;background:#EEE9FB;border:1px solid #B8AEDE33}
.cap{font-family:Inter;font-size:12.5px;color:#6B6C7F;margin:0;min-height:34px}
@media (max-width:820px){
  .demo-grid{grid-template-columns:minmax(0,1fr)}
  .demo-steps{border-right:none;border-bottom:1px solid #E9E1CB;flex-direction:row;overflow-x:auto;gap:6px;padding:10px}
  .demo-steps>li{flex:0 0 auto;max-width:180px}
}
</style></head><body>
<div class="wrap">
<div><div class="vplabel">Desktop 1180</div><div class="vp desk" id="a"></div></div>
<div><div class="vplabel">Mobile 375</div><div class="vp mob" id="b"></div></div>
</div>
<script>
const steps=[["01","Créez la mission","un brief suffit"],["02","Réunissez les candidats","import + vivier"],["03","Composez la shortlist","message d'approche inclus"],["04","Suivez la pipeline","toutes vos missions"],["05","Chiffrez la mission","option Suite Pricing"]];
const pool=[["Martin D.","i",91,"CV_Martin_D.pdf"],["Awa K.","i",84,"CV_Awa_K.pdf"],["Sofia L.","v",88,"Chef de projet · 7 ans"],["Julien R.","i",62,"CV_Julien_R.pdf"],["Yanis B.","v",58,"Chef de projet · 5 ans"]];
const html=`<div class="frame">
<div class="bar"><span style="display:flex;gap:5px;flex-shrink:0"><span class="dot" style="background:#E96A5A"></span><span class="dot" style="background:#8A6216"></span><span class="dot" style="background:#2F6B33"></span></span><span class="url">naywastudio.com / workspace</span></div>
<div class="demo-grid">
<ol class="demo-steps">${steps.map(([n,l,h],i)=>`<li><div class="step ${i===1?'on':''}"><span class="n">${n}</span><span style="min-width:0"><span class="l">${l}</span><span class="h">${h}</span></span></div></li>`).join('')}</ol>
<div class="stage">
<div class="panel">
<div class="lab">Mission · candidats</div>
<div class="drop"><span class="lab">Déposez vos CVs</span><span class="file">CV_Martin_D.pdf</span><span class="file">CV_Awa_K.pdf</span><span class="file">CV_Julien_R.pdf</span></div>
<div style="display:flex;justify-content:flex-end"><span class="btn">Matcher le vivier</span></div>
<div style="display:flex;flex-direction:column;gap:7px;flex:1;min-width:0">
${pool.map(([n,s,v,f])=>`<div class="row"><div style="flex:1;min-width:0"><div class="rt">${n}</div><div class="rs"><span class="bdg ${s}">${s==='i'?'importé':'vivier'}</span><span class="f">${f}</span></div></div><span class="score ${v>=75?'g':'v'}">${v}</span></div>`).join('')}
</div></div>
<p class="cap">Importez des CVs dans la mission, ou laissez Nora piocher dans votre vivier.</p>
</div></div></div>`;
document.getElementById('a').innerHTML=html;document.getElementById('b').innerHTML=html;
</script></body></html>
